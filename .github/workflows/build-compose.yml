name: build-compose

# DRAFT multi-arch build of the composed vybox-eda (Dockerfile.compose): pulls the
# Vyges multi-arch tool bundles + apt magic/netgen + Vyges CLI/Loom + PDKs, and pushes
# a single multi-arch manifest. buildx multi-platform (no source compile in the compose).
# Gated on the last bundles publishing (vyges-openroad, vyges-yosys).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "release tag (e.g. 2026.07)"
        required: true

permissions:
  packages: write

env:
  IMG: ghcr.io/vyges-tools/vybox-eda

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push multi-arch (amd64 + arm64)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          docker buildx build -f Dockerfile.compose \
            --platform linux/amd64,linux/arm64 --provenance=false \
            -t "$IMG:$VERSION" -t "$IMG:latest" --push .
      - name: Show manifest
        run: docker buildx imagetools inspect "$IMG:${{ inputs.version }}"
