# Build + publish vybox-eda. MANUAL by design (heavy from-scratch EDA build,
# ~hours on a free 4-vCPU runner) — triggered only via workflow_dispatch, never
# automatically on push/PR. Documentation changes (*.md, docs/) therefore can never
# trigger a build; they are also excluded from the build context via .dockerignore.
# Publishes the chosen target to GHCR (ghcr.io/vyges-tools/vybox-eda) via GITHUB_TOKEN —
# free for public OSS. GHCR-only by design.
name: Build & Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        type: choice
        default: rtl2gds-base
        options: [rtl2gds-base, rtl2gds, full]
      push:
        description: "Push to registries (else build-only)"
        type: boolean
        default: true
  # Manual-only today. When we later enable auto-builds on code changes, uncomment
  # the push trigger below — docs are already excluded so README/docs/ commits never
  # kick off the (multi-hour) build. Keep these paths-ignore globs in sync with
  # .dockerignore. (paths-ignore only affects push/PR events, not workflow_dispatch.)
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - '**/*.md'
  #     - 'docs/**'
  #     - 'LICENSE'
  #     - 'NOTICE'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350          # from-scratch build (OpenROAD source) is the long pole
    steps:
      - uses: actions/checkout@v6

      # The from-scratch build (source-built tools + PDKs) needs more disk than a
      # hosted runner has by default. Reclaim ~30 GB of preinstalled tooling.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Load version pins
        id: pins
        run: |
          {
            echo 'args<<EOF'
            grep -vE '^\s*(#|$)' versions.lock
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compose image tag
        id: tags
        run: echo "tags=ghcr.io/vyges-tools/vybox-eda:${{ inputs.target }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build${{ inputs.push && ' & push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: ${{ inputs.target }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ steps.pins.outputs.args }}
          # Registry-backed buildkit cache (no 10 GB GHA-cache eviction): once a
          # build succeeds, the heavy OR-Tools/OpenROAD layers persist here, so later
          # runs reuse them instead of re-downloading + re-compiling from source.
          cache-from: type=registry,ref=ghcr.io/vyges-tools/vybox-eda:buildcache
          cache-to: type=registry,ref=ghcr.io/vyges-tools/vybox-eda:buildcache,mode=max
