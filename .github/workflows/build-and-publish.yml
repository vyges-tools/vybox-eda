# Build + publish vybox-eda. Manual by design (heavy EDA build).
# Publishes the chosen target to every registry whose credentials are set:
#   GHCR    ghcr.io/vyges-tools/vybox-eda   (always, via GITHUB_TOKEN)
#   Docker Hub  docker.io/<DOCKERHUB_ORG>/vybox-eda   (if DOCKERHUB_* secrets set)
#   Quay.io quay.io/vyges-tools/vybox-eda   (if QUAY_* secrets set)
# All three are free for public OSS repos. For Docker Hub, also apply to the
# Docker-Sponsored Open Source program (Apache-2.0 qualifies) to remove pull
# rate limits.
name: Build & Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        type: choice
        default: rtl2gds
        options: [rtl2gds-base, rtl2gds, full]
      push:
        description: "Push to registries (else build-only)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_ORG: ${{ vars.DOCKERHUB_ORG }}        # e.g. "vyges"; defaults below
  QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
  QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load version pins
        id: pins
        run: |
          {
            echo 'args<<EOF'
            grep -vE '^\s*(#|$)' versions.lock
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compose image tags (one per configured registry)
        id: tags
        run: |
          org="${DOCKERHUB_ORG:-vyges}"
          {
            echo 'tags<<EOF'
            echo "ghcr.io/vyges-tools/vybox-eda:${{ inputs.target }}"
            [ -n "$DOCKERHUB_USERNAME" ] && echo "docker.io/${org}/vybox-eda:${{ inputs.target }}"
            [ -n "$QUAY_USERNAME" ] && echo "quay.io/vyges-tools/vybox-eda:${{ inputs.target }}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.push && env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to Quay.io
        if: ${{ inputs.push && env.QUAY_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ env.QUAY_USERNAME }}
          password: ${{ env.QUAY_TOKEN }}

      - name: Build${{ inputs.push && ' & push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: ${{ inputs.target }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ steps.pins.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Keep the Docker Hub repo "Overview" in sync with README.md.
  dockerhub-readme:
    needs: build
    if: ${{ inputs.push && vars.DOCKERHUB_ORG != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_ORG }}/vybox-eda
          short-description: "Container for building RTL → GDSII (slim open-EDA toolchain)."
          readme-filepath: ./README.md
