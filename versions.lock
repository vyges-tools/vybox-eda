# vybox-eda — pinned versions (single source for scripts/build.sh).
#
# Format: KEY=VALUE, one per line. build.sh reads these and passes them as
# --build-arg overrides of the Dockerfile ARG defaults, so a clean rebuild is
# reproducible. Mirror any change into the Dockerfile ARG block too.
#
# EDA tool versions follow IIC_OSIC_TOOLS_TAG (one pinned image), not per-tool
# pins here. Bump the tag to move the tool set; see tools.yml for what's included.

# Base OS — explicit, never "latest" (debuggability).
UBUNTU_VERSION=24.04

# Python = Ubuntu 24.04 system python3 (iic uses the same; no override). The
# COPYd KLayout/OpenROAD python modules are cpython-3.12 ABI; never install another.
PYTHON_VERSION=3.12

# The EDA tool set (Yosys, OpenROAD, KLayout, Magic, Netgen, ngspice, Verilator,
# + sky130A/gf180 PDKs). Pin to a real DATED iic-osic-tools tag.
IIC_OSIC_TOOLS_TAG=2026.05

# Vyges binaries build toolchain
RUST_VERSION=1.83

# Board / mechanical CAD (full target only)
KICAD_VERSION=8.0
FREECAD_VERSION=1.0
OPENSCAD_VERSION=2021.01
