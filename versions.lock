# vybox-eda — pinned versions (single source for scripts/build.sh).
#
# build.sh passes each KEY=VALUE as a --build-arg. The image is built FROM SCRATCH
# on Ubuntu 24.04; the EDA tool versions below match the iic-osic-tools 2026.05
# co-tested set (the matrix reference — see tools.yml) but are built from their
# own pinned upstreams here. Bump one entry per commit.

UBUNTU_VERSION=24.04
PYTHON_VERSION=3.12

# EDA tools — iic-osic-tools 2026.05-aligned pins (verified git tags / commits)
YOSYS_REF=v0.65
VERILATOR_REF=v5.048
OPENROAD_REF=08f67ee5ecd14db5a42be8c610bbfd1ccf079299
# OpenROAD's prebuilt deps (it builds none itself) — iic-aligned pins.
ORTOOLS_VERSION=9.14
CUDD_VERSION=3.0.0
LEMON_VERSION=1.3.1
KLAYOUT_VERSION=0.30.8
MAGIC_REF=8.3.642
NETGEN_REF=1.5.319
NGSPICE_VERSION=46
OPEN_PDKS_REF=7b70722e33c03fcb5dabcf4d479fb0822d9251c9

# Vyges binaries build toolchain
RUST_VERSION=1.83

# Board / mechanical CAD (full target only)
KICAD_VERSION=8.0
FREECAD_VERSION=1.0
OPENSCAD_VERSION=2021.01

# FPGA flow (fpga target) — Lattice Nexus open toolchain + LiteX.
# Pins resolved against upstream HEADs 2026-06-21 (sv2v/slang aligned to tools.yml).
